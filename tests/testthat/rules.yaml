version: 1
defaults:
  na_equal: yes
  ignore_columns: []
  keys: ~
  label: comparaison df
row_validation:
  check_count: no
  expected_count: ~
  tolerance: 0.0
by_type:
  numeric:
    abs: 1.0e-09
    rel: 1.0e-09
  integer:
    abs: 0
  character:
    equal_mode: exact
    case_insensitive: no
    trim: no
  date:
    equal_mode: exact
  datetime:
    equal_mode: exact
  logical:
    equal_mode: exact
by_name:
  id: []
  value: []
